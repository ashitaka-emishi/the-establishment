name: Feature request
description: Suggest an improvement to gameplay or the interface.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What would this change improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior or interface.
    validations:
      required: true
  - type: textarea
    id: rules
    attributes:
      label: Rulebook considerations
      description: Note any relevant rulebook sections or gameplay implications.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe other approaches you considered.
